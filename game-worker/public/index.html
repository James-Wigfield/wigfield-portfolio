<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Word Imposter</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:      #020817;
      --surface: rgba(15, 23, 42, 0.75);
      --border:  rgba(148, 163, 184, 0.12);
      --amber:   #fbbf24;
      --cyan:    #22d3ee;
      --emerald: #34d399;
      --rose:    #fb7185;
      --violet:  #a78bfa;
      --text-0:  #f8fafc;
      --text-1:  #cbd5e1;
      --text-2:  #64748b;
      --mono:    'JetBrains Mono', 'Fira Code', monospace;
    }

    body {
      font-family: 'Space Grotesk', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text-0);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }

    .screen { width: 100%; max-width: 440px; }

    .logo {
      font-family: var(--mono);
      text-align: center;
      font-size: 1.25rem;
      color: var(--amber);
      letter-spacing: 0.15em;
      margin-bottom: 0.5rem;
    }
    .tagline {
      text-align: center;
      font-size: 0.78rem;
      color: var(--text-2);
      font-family: var(--mono);
      letter-spacing: 0.1em;
      margin-bottom: 2.5rem;
    }

    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      backdrop-filter: blur(12px);
    }

    label {
      display: block;
      font-size: 0.72rem;
      font-family: var(--mono);
      color: var(--text-2);
      letter-spacing: 0.12em;
      margin-bottom: 0.4rem;
    }

    input {
      width: 100%;
      background: rgba(15, 23, 42, 0.8);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text-0);
      font-family: var(--mono);
      font-size: 1rem;
      padding: 0.65rem 1rem;
      outline: none;
      transition: border-color 0.2s;
      margin-bottom: 1.25rem;
    }
    input:focus { border-color: var(--cyan); }

    .btn {
      width: 100%;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 0.85rem;
      letter-spacing: 0.1em;
      padding: 0.75rem 1.5rem;
      transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover  { opacity: 0.85; }
    .btn:active { transform: scale(0.98); }
    .btn--amber  { background: var(--amber);   color: #020817; }
    .btn--ghost  { background: transparent; border: 1px solid var(--border); color: var(--text-1); margin-top: 0.6rem; }
    .btn--cyan   { background: var(--cyan);    color: #020817; }
    .btn--rose   { background: var(--rose);    color: #020817; }
    .btn--violet { background: var(--violet);  color: #020817; }
    .btn:disabled { opacity: 0.4; cursor: default; }

    .divider {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin: 1.25rem 0;
      color: var(--text-2);
      font-size: 0.75rem;
      font-family: var(--mono);
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .room-code {
      text-align: center;
      font-family: var(--mono);
      letter-spacing: 0.4em;
      font-size: 2.5rem;
      color: var(--amber);
      margin: 1rem 0;
    }

    .section-label {
      font-family: var(--mono);
      font-size: 0.72rem;
      color: var(--text-2);
      letter-spacing: 0.12em;
      margin-bottom: 0.75rem;
    }

    .player-list { list-style: none; margin-bottom: 1.5rem; }
    .player-list li {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.5rem 0;
      border-bottom: 1px solid var(--border);
      font-family: var(--mono);
      font-size: 0.9rem;
    }
    .player-list li:last-child { border-bottom: none; }
    .badge {
      font-size: 0.65rem;
      padding: 0.1rem 0.4rem;
      border-radius: 4px;
      letter-spacing: 0.08em;
    }
    .badge--host { background: rgba(251,191,36,0.15); color: var(--amber); }
    .badge--you  { background: rgba(34,211,238,0.12); color: var(--cyan); }

    .role-card {
      text-align: center;
      padding: 2.5rem 1.5rem;
    }
    .role-tag {
      display: inline-block;
      font-family: var(--mono);
      font-size: 0.75rem;
      letter-spacing: 0.15em;
      padding: 0.3rem 0.8rem;
      border-radius: 6px;
      margin-bottom: 1.5rem;
    }
    .role-tag--player   { background: rgba(52,211,153,0.12); color: var(--emerald); border: 1px solid rgba(52,211,153,0.3); }
    .role-tag--imposter { background: rgba(251,113,133,0.12); color: var(--rose);    border: 1px solid rgba(251,113,133,0.3); }

    .role-title  { font-size: 1.5rem; font-weight: 700; margin-bottom: 0.5rem; }
    .role-word   { font-family: var(--mono); font-size: 2rem; color: var(--cyan); margin: 0.5rem 0; letter-spacing: 0.05em; }
    .role-hint   { font-size: 0.85rem; color: var(--text-2); margin-top: 0.5rem; }
    .role-cat    { font-family: var(--mono); font-size: 0.8rem; color: var(--violet); letter-spacing: 0.1em; margin-top: 0.25rem; }

    .error-msg { color: var(--rose); font-size: 0.8rem; font-family: var(--mono); margin-bottom: 0.75rem; }

    .hidden { display: none !important; }
  </style>
</head>
<body>
  <!-- Entry screen -->
  <div class="screen" id="screen-entry">
    <p class="logo">// WORD IMPOSTER</p>
    <p class="tagline">ONE PLAYER DOESN'T KNOW THE WORD — FIND THEM</p>
    <div class="card">
      <label for="input-name">YOUR CALLSIGN</label>
      <input id="input-name" type="text" placeholder="e.g. NightOwl" maxlength="24" autocomplete="off" />

      <p id="entry-error" class="error-msg hidden"></p>

      <button class="btn btn--amber" id="btn-create">CREATE ROOM</button>

      <div class="divider">or join</div>

      <label for="input-room">ROOM CODE</label>
      <input id="input-room" type="text" placeholder="ABCD" maxlength="4"
             autocomplete="off" style="text-transform:uppercase;letter-spacing:0.3em;margin-bottom:1.25rem" />
      <button class="btn btn--ghost" id="btn-join">JOIN ROOM</button>
    </div>
  </div>

  <!-- Lobby screen -->
  <div class="screen hidden" id="screen-lobby">
    <p class="logo">// ARCADE VAULT</p>
    <p class="tagline">WAITING FOR PLAYERS</p>
    <div class="card">
      <p class="section-label">ROOM CODE</p>
      <p class="room-code" id="lobby-code">----</p>

      <p class="section-label">PLAYERS</p>
      <ul class="player-list" id="lobby-players"></ul>

      <button class="btn btn--cyan hidden" id="btn-start">START GAME →</button>
      <p id="lobby-waiting" style="font-family:var(--mono);font-size:0.8rem;color:var(--text-2);text-align:center">
        Waiting for host to start…
      </p>
    </div>
  </div>

  <!-- Game screen -->
  <div class="screen hidden" id="screen-game">
    <p class="logo">// WORD IMPOSTER</p>
    <p class="tagline" id="game-room-label">ROOM: ----</p>
    <div class="card role-card" id="role-display">
      <!-- Populated by JS -->
    </div>
    <div style="margin-top:1rem">
      <ul class="player-list" id="game-players"></ul>
      <button class="btn btn--rose hidden" id="btn-reset">RESET ROUND</button>
    </div>
  </div>

  <script>
    // ── Config ──────────────────────────────────────────────────────────────
    // Replace with your deployed worker URL, e.g. wss://imposter-game-worker.YOUR_SUBDOMAIN.workers.dev
    const WS_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
      ? `ws://${location.host}/ws`
      : `wss://${location.host}/ws`;

    // ── State ────────────────────────────────────────────────────────────────
    let ws = null;

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const $ = id => document.getElementById(id);

    const screens = {
      entry: $('screen-entry'),
      lobby: $('screen-lobby'),
      game:  $('screen-game'),
    };

    function showScreen(name) {
      Object.values(screens).forEach(s => s.classList.add('hidden'));
      screens[name].classList.remove('hidden');
    }

    // ── Entry actions ─────────────────────────────────────────────────────────
    $('btn-create').addEventListener('click', () => connect(null));
    $('btn-join').addEventListener('click', () => {
      const code = $('input-room').value.trim().toUpperCase();
      if (code.length !== 4) {
        showError('Enter a valid 4-letter room code.');
        return;
      }
      connect(code);
    });

    $('input-room').addEventListener('input', e => {
      e.target.value = e.target.value.toUpperCase().replace(/[^A-Z]/g, '');
    });

    function showError(msg) {
      const el = $('entry-error');
      el.textContent = '// ' + msg;
      el.classList.remove('hidden');
    }

    function connect(roomCode) {
      const name = $('input-name').value.trim();
      if (!name) { showError('Enter your callsign first.'); return; }

      const url = new URL(WS_BASE);
      url.searchParams.set('name', name);
      if (roomCode) url.searchParams.set('room', roomCode);

      ws = new WebSocket(url);

      ws.addEventListener('open', () => {
        $('entry-error').classList.add('hidden');
      });

      ws.addEventListener('message', e => {
        let data;
        try { data = JSON.parse(e.data); } catch { return; }
        if (data.type === 'state') applyState(data);
      });

      ws.addEventListener('close', () => {
        showScreen('entry');
        showError('Disconnected from server.');
        ws = null;
      });

      ws.addEventListener('error', () => {
        showError('Could not connect to server.');
      });
    }

    // ── Apply server state ────────────────────────────────────────────────────
    function applyState(state) {
      $('lobby-code').textContent = state.roomCode;
      $('game-room-label').textContent = 'ROOM: ' + state.roomCode;

      renderPlayers('lobby-players', state.players);
      renderPlayers('game-players', state.players);

      // Host controls
      $('btn-start').classList.toggle('hidden', !state.isHost || state.phase !== 'lobby');
      $('lobby-waiting').style.display = state.isHost ? 'none' : 'block';
      $('btn-reset').classList.toggle('hidden', !state.isHost || state.phase !== 'game');

      if (state.phase === 'lobby') {
        showScreen('lobby');
      } else if (state.phase === 'game') {
        renderRole(state);
        showScreen('game');
      }
    }

    function renderPlayers(listId, players) {
      const ul = $(listId);
      ul.innerHTML = '';
      players.forEach(p => {
        const li = document.createElement('li');
        li.textContent = p.name;
        if (p.isHost) li.innerHTML += ' <span class="badge badge--host">HOST</span>';
        if (p.isYou)  li.innerHTML += ' <span class="badge badge--you">YOU</span>';
        ul.appendChild(li);
      });
    }

    function renderRole(state) {
      const el = $('role-display');
      if (state.role === 'imposter') {
        el.innerHTML = `
          <span class="role-tag role-tag--imposter">IMPOSTER</span>
          <p class="role-title" style="color:var(--rose)">You Are the Imposter</p>
          <p class="role-hint">Blend in. Don't let them know you don't know the word.</p>
          ${state.category ? `<p class="role-cat">CATEGORY: ${state.category}</p>` : ''}
        `;
      } else {
        el.innerHTML = `
          <span class="role-tag role-tag--player">CREW MEMBER</span>
          <p class="role-title">The secret word is</p>
          <p class="role-word">${state.word}</p>
          ${state.category ? `<p class="role-cat">CATEGORY: ${state.category}</p>` : ''}
          <p class="role-hint">Discuss the word without saying it. Find the Imposter.</p>
        `;
      }
    }

    // ── In-game actions ───────────────────────────────────────────────────────
    $('btn-start').addEventListener('click', () => {
      ws?.send(JSON.stringify({ type: 'start' }));
    });

    $('btn-reset').addEventListener('click', () => {
      ws?.send(JSON.stringify({ type: 'reset' }));
    });
  </script>
</body>
</html>
