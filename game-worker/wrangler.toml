name = "imposter-game-worker"
main = "src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[[durable_objects.bindings]]
name = "GAME_ROOM"
class_name = "GameRoom"

[[migrations]]
tag = "v1"
new_sqlite_classes = ["GameRoom"]

# Static assets for the standalone frontend
[assets]
directory = "./public"
binding = "ASSETS"

[vars]
# Add ALLOWED_ORIGIN to restrict CORS in production, e.g. "https://jameswigfield.com"
ALLOWED_ORIGIN = "*"
